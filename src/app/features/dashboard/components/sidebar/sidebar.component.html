<aside class="w-64 bg-white border-r border-gray-200 flex flex-col fixed h-screen">

  <div class="p-6 border-b border-gray-200">
    <a routerLink="/app" class="flex items-center gap-2 no-underline">
      <lucide-icon [img]="icons.GraduationCap" class="w-8 h-8 text-yellow-600"></lucide-icon>
      <span class="text-xl font-bold text-gray-900">EvalPro</span>
    </a>
  </div>

  <nav class="flex-1 p-4 overflow-y-auto">
    <ul class="space-y-2">
      @for (item of menuItems(); track item.path) {
        <li>
          <a
            [routerLink]="item.path"
            routerLinkActive="bg-yellow-50 text-yellow-600 font-medium"
            [routerLinkActiveOptions]="{ exact: false }"
            #rla="routerLinkActive"
            [class.text-gray-700]="!rla.isActive"
            class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors relative hover:bg-gray-50 cursor-pointer no-underline group">
            <lucide-icon [img]="item.icon" class="w-5 h-5 group-hover:text-gray-900"></lucide-icon>
            <span class="flex-1">{{ item.label }}</span>

            @if (item.badge) {
              <span class="bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full min-w-[20px] text-center">
                {{ item.badge }}
              </span>
            }
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="p-4 border-t border-gray-200">
    <div class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-50 transition-colors">
      <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">
        <lucide-icon [img]="icons.User" class="w-5 h-5 text-yellow-600"></lucide-icon>
      </div>
      <div class="flex-1 min-w-0">
        <div class="font-medium text-gray-900 text-sm">{{ userName()}}</div>
        <div class="text-xs text-gray-500 capitalize">{{ userRole() ?? 'Unknown' }}</div>
      </div>
      <button
        (click)="Logout()"
        class="p-1 hover:bg-gray-100 rounded transition-colors cursor-pointer"
        title="Logout">
        <lucide-icon [img]="icons.LogOut" class="w-4 h-4 text-gray-400"></lucide-icon>
      </button>
    </div>
  </div>
</aside>
<loading-modal
  [status]="modalStatus()"
  [message1]="messageModal1()"
  [message2]="messageModal2()"
>
</loading-modal>
