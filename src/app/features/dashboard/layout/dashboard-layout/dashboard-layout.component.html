<div class="min-h-screen bg-gray-50 flex">

  <side-bar/>

  <div class="flex-1 flex flex-col ml-64 min-w-0">

    <header class="bg-white border-b border-gray-200 px-8 py-4 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">
            {{ pageTitle() }}
          </h1>
        </div>
        <div class="flex items-center gap-4">
          <button class="relative p-2 hover:bg-gray-100 rounded-lg transition-colors cursor-pointer">
            <lucide-icon [img]="icons.Bell" class="w-5 h-5 text-gray-600"></lucide-icon>
            <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-auto">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
