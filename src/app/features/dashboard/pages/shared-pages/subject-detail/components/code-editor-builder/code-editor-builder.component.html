<form [formGroup]="codeForm" class="space-y-6">

  <div>
    <label class="block text-sm font-semibold text-gray-900 mb-2">
      Challenge Description <span class="text-red-500">*</span>
    </label>
    <textarea
      formControlName="prompt"
      placeholder="Describe the programming challenge, requirements, and constraints..."
      rows="4"
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent resize-none"
      [class.border-red-500]="formUtils.isValidField(codeForm, 'prompt')"
    ></textarea>
    @if (formUtils.isValidField(codeForm, 'prompt')) {
      <p class="mt-1 text-sm text-red-500">{{ formUtils.getFieldError(codeForm, 'prompt') }}</p>
    }
  </div>

  <div>
    <label class="block text-sm font-semibold text-gray-900 mb-2">
      Points <span class="text-red-500">*</span>
    </label>
    <input
      type="number"
      min="1"
      step="5"
      appOnlyNumbers
      formControlName="points"
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent"
    />
    @if (formUtils.isValidField(codeForm, 'points')) {
      <p class="mt-1 text-sm text-red-500">{{ formUtils.getFieldError(codeForm, 'points') }}</p>
    }
  </div>

  <div formGroupName="metadata">

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-semibold text-gray-900 mb-2">
        Programming Language <span class="text-red-500">*</span>
      </label>
      <select
        formControlName="language"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent"
      >
        @for (lang of LANGUAGES; track lang.value) {
          <option [value]="lang.value">{{ lang.label }}</option>
        }
      </select>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-900 mb-2">
        Framework (Optional)
      </label>
      <select
        formControlName="framework"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:border-transparent"
      >
        @for (fw of FRAMEWORKS; track fw.value) {
          <option [value]="fw.value">{{ fw.label }}</option>
        }
      </select>
    </div>
  </div>

  <div>
    <label class="block text-sm font-semibold text-gray-900 mb-2">
      Starter Code (Optional)
    </label>
    <div class="border-2 border-gray-300 rounded-lg overflow-hidden h-[200px] text-left">

      <ngx-monaco-editor
        class="h-full w-full"
        [options]="editorOptions()"
        formControlName="starterCode"
      >
      </ngx-monaco-editor>

    </div>
    <p class="mt-2 text-xs text-gray-500">
      This code will be pre-populated in the student's editor
    </p>
  </div>

  </div>

  <div class="flex gap-3 pt-4 border-t border-gray-200">
    <button
      type="button"
      (click)="cancel()"
      class="flex-1 px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-medium cursor-pointer"
    >
      Cancel
    </button>
    <button
      type="button"
      (click)="addQuestion()"
      class="flex-1 px-6 py-3 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition-colors font-medium cursor-pointer"
    >
      Add Question
    </button>
  </div>
</form>
