<section class="py-20 bg-gray-50">
  <div class="max-w-7xl mx-auto px-8">

    <div class="text-center mb-16">
      <div class="inline-block px-4 py-2 bg-yellow-100 text-yellow-700 rounded-full text-sm font-medium mb-4">
        Platform Features
      </div>
      <h2 class="text-4xl font-bold text-gray-900 mb-4">
        Everything You Need to Manage Exams
      </h2>
      <p class="text-xl text-gray-600 max-w-3xl mx-auto">
        A comprehensive suite of tools designed to make exam creation,
        distribution, and evaluation seamless for educators and students alike.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

      @for (feature of features; track feature.title) {
        <div class="bg-white rounded-xl p-6 border border-gray-200 hover:shadow-lg transition-shadow">

          <div
            class="w-12 h-12 rounded-lg flex items-center justify-center mb-4"
            [class]="getColors(feature.color).bg">

            <lucide-icon
              [img]="feature.icon"
              class="w-6 h-6"
              [class]="getColors(feature.color).icon">
            </lucide-icon>

          </div>

          <h3 class="text-lg font-semibold text-gray-900 mb-2">
            {{ feature.title }}
          </h3>

          <p class="text-gray-600 text-sm leading-relaxed">
            {{ feature.description }}
          </p>

        </div>
      }

    </div>
  </div>
</section>
