<div class="min-h-screen bg-gray-50 flex">

  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">

    <div class="p-6 border-b border-gray-200">
      <a routerLink="/" class="flex items-center gap-2 cursor-pointer no-underline">
        <lucide-icon [img]="icons.GraduationCap" class="w-8 h-8 text-yellow-600"></lucide-icon>
        <span class="text-xl font-bold text-gray-900">{{ sideBarTitle() }}</span>
      </a>
    </div>

    <nav class="flex-1 p-4">
      <ul class="space-y-2">
        @for (item of menuItems; track item.path) {
          <li>
            <a
              [routerLink]="item.path"
              routerLinkActive="bg-yellow-50 text-yellow-600 font-medium"
              [routerLinkActiveOptions]="{ exact: false }"
              class="flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-gray-700 hover:bg-gray-50 cursor-pointer no-underline group">

              <lucide-icon [img]="item.icon" class="w-5 h-5 group-hover:text-gray-900"></lucide-icon>
              <span>{{ item.label }}</span>
            </a>
          </li>
        }
      </ul>
    </nav>

    <div class="p-4 border-t border-gray-200">
      <div class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
        <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">
          <lucide-icon [img]="icons.User" class="w-5 h-5 text-yellow-600"></lucide-icon>
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-medium text-gray-900 text-sm truncate">Rafael Hdez</div>
          <div class="text-xs text-gray-500 truncate">Professor</div>
        </div>
        <lucide-icon [img]="icons.LogOut" class="w-4 h-4 text-gray-400 hover:text-red-500 transition-colors"></lucide-icon>
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">

    <header class="bg-white border-b border-gray-200 px-8 py-4 sticky top-0 z-20">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">
            {{ pageTitle() }}
          </h1>
        </div>

        <div class="flex items-center gap-4">
          <button class="relative p-2 hover:bg-gray-100 rounded-lg transition-colors cursor-pointer">
            <lucide-icon [img]="icons.Bell" class="w-5 h-5 text-gray-600"></lucide-icon>
            <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-auto">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
