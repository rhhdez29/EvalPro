@if (status() !== 'oculto') {
  <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 transition-opacity">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl transform transition-all">

      @switch (status()) {

        @case ('cargando') {
          <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-yellow-500 mx-auto mb-6"></div>
          <h3 class="text-xl font-bold text-gray-800">{{message1()}}</h3>
          <p class="text-gray-500 mt-2">{{message2()}}</p>
        }

        @case ('exito') {
          <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
            <svg class="h-10 w-10 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
          </div>
          <h3 class="text-xl font-bold text-gray-800">{{message1()}}</h3>
          <p class="text-gray-500 mt-2">{{message2()}}</p>
        }

        @case ('error') {
          <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-6">
            <svg class="h-10 w-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </div>
          <h3 class="text-xl font-bold text-gray-800">{{message1()}}</h3>
          <p class="text-gray-500 mt-2">{{ message2() }}</p>
        }
      }

    </div>
  </div>
}
